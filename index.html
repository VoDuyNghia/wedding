<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Open External Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .popup {
      background: #fff;
      width: 90%;
      max-width: 340px;
      border-radius: 14px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    .popup h3 {
      margin-bottom: 8px;
      font-size: 18px;
    }

    .popup p {
      font-size: 14px;
      color: #555;
      margin-bottom: 18px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      text-align: center;
      border-radius: 10px;
      background: #007aff;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
    }
  </style>

  <script>
    (function () {
      const TARGET_URL = "https://uat.cypher.global/s/2cqJPTytrd";
      const ANDROID_INTENT =
        "intent://uat.cypher.global/s/2cqJPTytrd#Intent;scheme=https;end";

      function isiOS() {
        return /iphone|ipad|ipod/i.test(navigator.userAgent);
      }

      function isAndroid() {
        return /android/i.test(navigator.userAgent);
      }

      function isSocialWebView() {
        return /(FBAN|FBAV|Instagram|TikTok|Twitter)/i.test(
          navigator.userAgent
        );
      }

      window.onload = function () {

        // ✅ ANDROID → AUTO OPEN EXTERNAL BROWSER
        if (isAndroid() && isSocialWebView()) {
          window.location.href = ANDROID_INTENT;
          return;
        }

        // ✅ iOS → SHOW POPUP (REQUIRED)
        if (isiOS() && isSocialWebView()) {
          document.getElementById("overlay").style.display = "flex";
          return;
        }

        // ✅ Normal browser
        window.location.href = TARGET_URL;
      };
    })();
  </script>
</head>

<body>

  <!-- ✅ iOS POPUP -->
  <div id="overlay" class="overlay">
    <div class="popup">
      <h3>Mở bằng trình duyệt</h3>
      <p>Nhấn nút bên dưới để mở link bằng Safari.</p>

      <!-- ✅ BẮT BUỘC: <a href>, KHÔNG DÙNG JS -->
      <a
        class="btn"
        href="com-apple-mobilesafari-tab:https://uat.cypher.global/s/2cqJPTytrd"
      >
        Mở ngay
      </a>
    </div>
  </div>

</body>
</html>
