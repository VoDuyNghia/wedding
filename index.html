<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Opening…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script>
    (function () {
      var TARGET_URL = "https://uat.cypher.global/s/2cqJPTytrd";
      var intentUsed = false;

      function isMobile() {
        return /android|iphone|ipad|ipod/i.test(navigator.userAgent);
      }

      function isiOS() {
        return /iphone|ipad|ipod/i.test(navigator.userAgent);
      }

      function isAndroid() {
        return /android/i.test(navigator.userAgent);
      }

      function isSocialWebView() {
        return /(FBAN|FBAV|Instagram|TikTok|Twitter)/i.test(
          navigator.userAgent
        );
      }

      if (!isMobile()) return;

      window.onload = function () {
        // ✅ iOS → Safari
        if (isiOS() && isSocialWebView()) {
          window.location.href =
            "com-apple-mobilesafari-tab:" + TARGET_URL;
          return;
        }

        // ✅ Android → Intent
        if (isAndroid() && isSocialWebView()) {
          intentUsed = true;
          window.location.href =
            "intent://uat.cypher.global/s/2cqJPTytrd" +
            "#Intent;scheme=https;end";
          return;
        }

        // ✅ browser thường
        window.location.href = TARGET_URL;
      };

      // ✅ XỬ LÝ KHI USER GO BACK TỪ EXTERNAL BROWSER
      document.addEventListener("visibilitychange", function () {
        if (
          document.visibilityState === "visible" &&
          intentUsed &&
          isAndroid()
        ) {
          // Fallback: mở browser thường
          window.location.href = TARGET_URL;
        }
      });
    })();
  </script>
</head>

<body>
</body>
</html>
