<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
    }

    /* Overlay chỉ dùng cho iOS */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .popup {
      background: #fff;
      width: 90%;
      max-width: 340px;
      border-radius: 14px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    .popup h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .popup p {
      font-size: 14px;
      color: #555;
      margin-bottom: 18px;
    }

    .popup button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #007aff;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }

    .popup button:active {
      background: #0060d1;
    }
  </style>

  <script>
    (function () {
      const TARGET_URL = "https://uat.cypher.global/s/2cqJPTytrd";
      const ANDROID_INTENT =
        "intent://uat.cypher.global/s/2cqJPTytrd#Intent;scheme=https;end";

      function isiOS() {
        return /iphone|ipad|ipod/i.test(navigator.userAgent);
      }

      function isAndroid() {
        return /android/i.test(navigator.userAgent);
      }

      function isSocialWebView() {
        return /(FBAN|FBAV|Instagram|TikTok|Twitter)/i.test(
          navigator.userAgent
        );
      }

      window.onload = function () {
        // ✅ ANDROID: auto redirect → browser mặc định
        if (isAndroid() && isSocialWebView()) {
          window.location.href = ANDROID_INTENT;
          return;
        }

        // ✅ IOS: CHỈ HIỆN POPUP (KHÔNG auto)
        if (isiOS() && isSocialWebView()) {
          document.getElementById("overlay").style.display = "flex";
          return;
        }

        // ✅ Browser thường / không phải social
        window.location.href = TARGET_URL;
      };

      // ✅ iOS user click → mở Safari
      window.openExternal = function () {
        window.location.href =
          "com-apple-mobilesafari-tab:" + TARGET_URL;
      };
    })();
  </script>
</head>

<body>
  <!-- Popup chỉ cho iOS -->
  <div id="overlay" class="overlay">
    <div class="popup">
      <h3>Mở bằng trình duyệt</h3>
      <p>
        Để tiếp tục, vui lòng mở link bằng trình duyệt mặc định của iPhone.
      </p>
      <button onclick="openExternal()">Mở ngay</button>
    </div>
  </div>
</body>
</html>
